name: antigravity
version: 1.0.0
type: development
description: "Guidelines and configuration for the Google Antigravity agent-first IDE."
skills:
  - name: "Mission Control Assistant"
    description: "Assists in defining objectives and task lists for autonomous agents in Antigravity."
  - name: "Verification Walkthrough"
    description: "Guidance for creating browser-based verification walkthroughs using Antigravity's built-in browser agent."
commands:
  - name: "/plan"
    description: "Request a detailed implementation plan and task list"
  - name: "/verify"
    description: "Instruct the agent to run tests and browser walkthroughs"
  - name: "/browse"
    description: "Launch the browser agent to search or interact with a URL"
  - name: "/reset"
    description: "Clear the current agent's short-term memory or session state"
hooks:
  post-install: "scripts/post-install.sh"
