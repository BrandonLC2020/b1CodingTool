name: general
version: 1.0.0
type: cross_cutting
description: "Agnostic foundation for all b1CodingTool projects. Includes universal conventions, best practices, and base agent capabilities."
skills:
  - name: "Agnostic README Generator"
    description: "Generates or updates a project README.md following the b1 standard structure."
  - name: "Change Summarizer"
    description: "Summarizes recent code changes for commit messages or status updates."
commands:
  - name: "/help"
    description: "List available commands and skills for the current project"
  - name: "/status"
    description: "Summarize current project state and pending tasks"
  - name: "/plan"
    description: "Request a structured implementation plan for a complex objective"
  - name: "/verify"
    description: "Run tests and linters to confirm implementation correctness"
hooks:
  post-install: "scripts/post-install.sh"
